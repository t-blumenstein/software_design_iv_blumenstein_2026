<div class="container mx-auto p-4">
  <div class="text-center">
    <h1 class="text-4xl font-bold my-4">Pipe() & Operator Functions</h1>
    <p class="text-2xl text-orange-600 font-bold mb-4">
      Open Developer Console to See Initial & Return Values Throughout Operator Chain
    </p>

    <div class="mt-8">
      <h3 class="text-3xl font-bold text-black mb-4">Final Results:</h3>
      <ul class="text-lg text-black pl-6">
        @for (number of results(); track $index) {
          <li>{{ number }}</li>
        }
      </ul>
    </div>
  </div>
</div>
