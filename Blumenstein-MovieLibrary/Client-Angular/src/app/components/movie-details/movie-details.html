<div class="min-h-screen bg-gray-950 py-12">
  <div class="container mx-auto px-6 max-w-2xl">
    <div class="bg-gray-900 rounded-xl shadow-xl border border-gray-800 p-8">
      <h2 class="text-3xl font-bold text-white mb-6">{{ (movie$ | async)?.title }}</h2>

      <div class="space-y-3 text-sm">
        <div class="flex gap-2">
          <span class="text-purple-400 font-semibold w-28 shrink-0">Director</span>
          <span class="text-gray-300">{{ (movie$ | async)?.director }}</span>
        </div>
        <div class="flex gap-2">
          <span class="text-purple-400 font-semibold w-28 shrink-0">Genre</span>
          <span class="text-gray-300">{{ (movie$ | async)?.genre }}</span>
        </div>
        <div class="flex gap-2">
          <span class="text-purple-400 font-semibold w-28 shrink-0">Release Year</span>
          <span class="text-gray-300">{{ (movie$ | async)?.releaseYear }}</span>
        </div>
        <div class="flex gap-2">
          <span class="text-purple-400 font-semibold w-28 shrink-0">Rating</span>
          <span class="text-gray-300">{{ (movie$ | async)?.rating }}/10</span>
        </div>
        <div class="flex gap-2 pt-2">
          <span class="text-purple-400 font-semibold w-28 shrink-0">Description</span>
          <span class="text-gray-300 leading-relaxed">{{ (movie$ | async)?.description }}</span>
        </div>
      </div>

      <button onclick="history.back()"
        class="mt-8 bg-purple-700 hover:bg-purple-600 text-white text-sm font-semibold px-6 py-2 rounded-lg transition-colors duration-200">
        Back
      </button>
    </div>
  </div>
</div>
