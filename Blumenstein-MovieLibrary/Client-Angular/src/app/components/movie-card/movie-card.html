<div class="bg-gray-900 rounded-xl overflow-hidden shadow-lg border border-gray-800 hover:border-purple-600 transition-colors duration-200 flex flex-col h-full">
  @if (movie?.posterPath) {
    <img [src]="movie?.posterPath" [alt]="movie?.title" class="w-full h-56 object-cover" />
  } @else {
    <div class="w-full h-56 bg-gray-800 flex items-center justify-center">
      <span class="text-gray-500 text-sm">No Poster</span>
    </div>
  }

  <div class="p-4 flex flex-col flex-1">
    <h3 class="text-white font-bold text-lg mb-3 leading-tight">{{ movie?.title }}</h3>

    <div class="space-y-1 text-sm text-gray-400 mb-3">
      <p><span class="text-purple-400 font-medium">Director:</span> {{ movie?.director }}</p>
      <p><span class="text-purple-400 font-medium">Genre:</span> {{ movie?.genre }}</p>
      <p><span class="text-purple-400 font-medium">Year:</span> {{ movie?.releaseYear }}</p>
      <p><span class="text-purple-400 font-medium">Rating:</span> {{ movie?.rating }}/10</p>
    </div>

    @if (movie?.isAvailableToStream) {
      <span class="inline-block bg-purple-700 text-purple-100 text-xs font-semibold px-2 py-1 rounded mb-3 w-fit">
        Available to Stream
      </span>
    }

    <p class="text-gray-500 text-sm leading-relaxed mb-4 flex-1 line-clamp-3">{{ movie?.description }}</p>

    <button (click)="view()"
      class="w-full bg-purple-700 hover:bg-purple-600 text-white text-sm font-semibold py-2 rounded-lg transition-colors duration-200 mt-auto">
      View Details
    </button>
  </div>
</div>
