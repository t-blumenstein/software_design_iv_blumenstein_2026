<div class="min-h-screen bg-gray-950 py-10">
  <div class="container mx-auto px-6 max-w-5xl">
    <h1 class="text-3xl font-bold text-white mb-8">Search Movies</h1>

    <div class="flex gap-3 mb-8">
      <input
        #movieQuery
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="search(movieQuery.value)"
        placeholder="Search by movie title..."
        class="flex-1 bg-gray-800 text-white placeholder-gray-500 border border-gray-700 focus:border-purple-500 focus:outline-none rounded-lg px-4 py-2.5 text-sm transition-colors duration-200"
      />
      <button
        type="button"
        (click)="search(movieQuery.value)"
        class="bg-purple-700 hover:bg-purple-600 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition-colors duration-200">
        Search
      </button>
    </div>

    @if (hasSearched) {
      @if (searchResults.length > 0) {
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
          @for (movie of searchResults; track movie.id) {
            <app-movie-card [movie]="movie"></app-movie-card>
          }
        </div>
      } @else {
        <div class="text-center py-16">
          <p class="text-gray-500 text-sm">No movies were found.</p>
        </div>
      }
    }
  </div>
</div>
