<div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-[#150026] via-[#2d0060] to-[#1a0033]">
	<div class="w-full max-w-md">
		<form (ngSubmit)="onSubmit()" [formGroup]="form" class="bg-[#2d0060]/90 border border-[#9b30ff]/40 shadow-xl shadow-[#9b30ff]/20 rounded-xl px-8 py-6 text-[#e8d5ff]">
			<h2 class="text-center text-2xl font-bold mb-4">Login</h2>

			<div *ngIf="registered()" class="mb-4 p-3 bg-green-50 border border-green-200 text-green-800 rounded text-black">
				Registration successful — please log in.
			</div>

			<label class="block mb-2 text-sm font-medium">Email address</label>
			<input formControlName="email" type="email" class="w-full mb-3 px-3 py-2 bg-[#1a0033] border border-[#9b30ff]/50 rounded-lg text-[#e8d5ff] focus:outline-none focus:ring-2 focus:ring-[#9b30ff]" />

			<label class="block mb-2 text-sm font-medium">Password</label>
			<input formControlName="password" type="password" class="w-full mb-4 px-3 py-2 bg-[#1a0033] border border-[#9b30ff]/50 rounded-lg text-[#e8d5ff] focus:outline-none focus:ring-2 focus:ring-[#9b30ff]" />

			<div class="flex items-center mb-4">
				<label class="inline-flex items-center text-sm text-gray-300">
					<input type="checkbox" formControlName="rememberMe" class="mr-2" />
					<span>Remember me</span>
				</label>
			</div>

			<button type="submit" class="w-full bg-[#9b30ff] hover:bg-[#7b2cff] text-white py-2 rounded-lg font-bold shadow-lg shadow-[#9b30ff]/40 transition">Login to your account</button>

			<p class="text-center text-sm text-[#9b6dcc] mt-4">Don't have an account? <a routerLink="/auth/register" href="/auth/register" class="text-[#c084fc] underline hover:text-white">Sign Up</a></p>
		</form>
	</div>
</div>
