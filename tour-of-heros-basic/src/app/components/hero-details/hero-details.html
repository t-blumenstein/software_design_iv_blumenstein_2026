<!-- TODO: if a hero is selected, show this block of HTML to display the hero's info -->
  @if(hero){
    <div class="max-w-md bg-white rounded-2xl shadow-md border border-gray-200 p-6 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-semibold text-gray-800">
          <!-- TODO add name, and have it always be uppercase -->
           {{hero.name}}
        </h2>

        <span class="bg-blue-600 text-white text-sm font-medium px-3 py-1 rounded-full">
          ID: <!-- TODO: add hero id  -->
          {{hero.id}}
        </span>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-gray-600"> Name </label>

        <!-- TODO: bind the input to the name property -->
        <input
          [(ngModel)]="hero.name"
          placeholder="Enter hero name"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
        />
      </div>
    </div>
  } @else {
    <!-- TODO: Have the below be conditionally displayed if a hero is not selected -->
    <div class="max-w-md text-2xl text-gray-500 italic">Select a hero to see details.</div>
  }
