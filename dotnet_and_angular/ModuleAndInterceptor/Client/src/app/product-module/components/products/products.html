<div class="container mx-auto p-4">
  <div class="flex justify-center mb-10">
    <app-search-bar class="w-1/2" [placeHolder]="'Search Products'"></app-search-bar>
  </div>

  <div class="grid grid-cols-3 gap-8 px-4">
    @for (      
      singleProduct of productList$ | async | nameSearch: (searchQuery$ | async);
      track singleProduct.id
    ) {
      <div>
        <app-product-card [product]="singleProduct"></app-product-card>
      </div>
    }
  </div>
</div>
